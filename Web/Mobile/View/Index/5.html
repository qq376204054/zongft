<!DOCTYPE html>
<html lang="en" data-dpr="1" style="font-size: 54px;">
<head>
<title>{$all_config['seo_default_title']}</title>
<meta name="description" content="{$all_config['seo_default_keys']}">
<meta name="keywords" content="{$all_config['seo_default_desc']}">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no">
<meta name="baidu-site-verification" content="">
<link rel="stylesheet" href="__ROOT__/static/wap5/zhuo-form.css">
<link rel="stylesheet" href="__ROOT__/static/wap5/cityPicker2.css">
<script src="__ROOT__/static/wap4/jquery-1.10.2.min.js"></script>
<script src="__ROOT__/static/wap4/jquery.form.js"></script>
<style>
    body{background:#fff;}
    .ui-header{
        display: block;
        background-color: #f4f4f5;
    }
    .info-banner{
        background-color: #e3e4e5;
    }
    .info-banner .info-content{
        padding-top: 32px;
    }
    .info-banner .info-content h1{
        font-size: 20px;
        color: #1d3658;
        text-align: center;
    }
    .info-banner .info-content h1 span{
        color: #FFF;
        font-size: 32px;
    }
    .info-banner .info-content .lump{
        background-color: #1d3658;
        font-size: 22px;
        color: #FFF;
        width: 304px;
        border-radius: 3px;
        margin: 0 auto;
        text-align: center;
        line-height: 28px;
        padding: 10px 0;
        margin-top: 19px;
    }
    .info-banner .info-content .lump span{
        font-size: 28px;
        color: #ddba14;
    }
    .info-banner .info-content p{
        text-align: center;
        font-size: 14px;
        margin-top: 23px;
    }
    .slogan{float:right;margin-right:15px;font-size: 14px;color:#999;}
    .tips{
        margin: 0 16px 20px 16px;
        font-size: 14px;
    }
    @media screen and (min-width: 320px) and (max-width: 375px){
        .info-banner .info-content h1{
            font-size: 18px;
        }
        .info-banner .info-content h1 span{
            font-size: 28px;
        }
        .slogan{margin-right:10px;}
    }
    .hidden-radio{display: none;}
    .fixed-tel{margin-top: 30px;display: block;width:100%;text-align: center;color:#fff;height:50px;line-height:50px;background:#333;font-size:14px;}
    .fixed-tel a{color:#fff}
    .fp_bg .font{margin-top:10px;font-size:14px;text-align: center;}
    .fp_bg .font-tit{margin-top:20px;font-size:18px;}
    .fp_bg .font i{font-style:normal;color:#e8541e}
    .ui-text option:nth-child(1){color:#666}
    .apply-form .ui-submit-btn{ background: #e8541e; color: #fff;}
    .apply-form .ui-form-item .verify-msg{ color: #e8541e;}
</style>
<body style="font-size: 12px;">
<div class="page active" id="view">
    <div class="fp_bg">
        <div class="info-banner">
            <img width="100%" src="__ROOT__/static/wap5/45.png">
        </div>
        <p style="margin: 20px 0 0 0;"><img width="100%" src="__ROOT__/static/wap5/jisudai2-img.png"></p>
        <p class="font font-tit">融资申请</p>
        <p class="font">已有<i>355567</i>人提交申请，<i>18797</i>人成功获得融资</p>
        <div class="ui-form apply-form">
            <form id="queryOffer" name="info_form" action="{:U('Action/apply_mobile')}" method="post">
                <div class="ui-form-item ui-form-item-r">
                    <label>城市</label>
                    <div class="ui-input">
                        <select name="city" class="ui-text">
                            <option value ="">您的城市</option>
                            <foreach name="customer_apply_city" item="city">
                                <option value ="{$city}">{$city}</option>
                            </foreach>
                        </select>
                    </div>
                </div>
                <div class="ui-form-item ui-form-item-r">
                    <label>姓名</label>
                    <div class="ui-input">
                        <input type="text" name="name" placeholder="输入您的姓名" class="ui-text">
                    </div>
                </div>
                <div class="ui-form-item ui-form-item-r">
                    <label>金额</label>
                    <div class="ui-input">
                        <input type="text" name="money" placeholder="输入需求金额（万）" class="ui-text">
                    </div>
                </div>
                <div class="ui-form-item ui-form-item-r">
                    <label>手机号码</label>
                    <div class="ui-input">
                        <input type="tel" name="mobile" id="mobile" placeholder="输入您的手机号" class="ui-text">
                    </div>
                </div>
                <div class="ui-form-item ui-form-item-r">
                    <label>验证码</label>
                    <div class="ui-input">
                        <input type="tel" name="code" placeholder="输入验证码" class="ui-text">
                    </div>
                    <!-- 若按钮不可点击则添加 disabled 类 -->
                    <input type="button" value="获取验证码" class="verify-msg getCode" id="getMsg">
                </div>
                <div class="services">
                    <label><input class="inputCheck" type="checkbox" name="services" checked="">我已阅读并同意<a href="{:U('mobile/index/article',array('id'=>'2875'))}">《用户服务与隐私条款》</a></label>
                </div>
                <input type="hidden" name="channel" value="5">
                <div class="ui-form-item ui-form-item-bottom">
                    <button type="submit" class="ui-submit-btn">立即申请</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    $(function(){
        $('select').on('change',function(){
            $('input[name="apply_city"]').val($(this).val());
        })
    })
</script>
<script>
    var sec=60;
    $('.getCode').click(function(){
        if($(this).val()=='获取验证码'){
            var myreg = /^((1{1})+\d{10})$/;
            var mobile=$('#mobile').val();
            if(!myreg.test(mobile)) {
                alert('请输入有效的手机号码！');return false;
            }
            $('.getCode').val("获取中...");
            $.ajax({
                type:"post",
                url:"{:U('Action/make_mobile_code')}",
                data:{
                    mobile:mobile,
                },
                dataType:"json",
                success:function(data){
                    if(data.errNum===0){
                        time();
                        sec=60;
                    }else{
                        alert(data.errMsg);
                        $('.getCode').val("获取验证码");
                    }
                },
                error:function(){
                    alert("系统异常，请稍后重试！");
                    $('.getCode').val("获取验证码");
                }
            });
        }
    });
    function time()
    {
        if(sec>0){
            $('.getCode').val(sec+'秒');
            sec=sec-1;
            setTimeout(time,1000);
        }else{
            $('.getCode').val('获取验证码');
        }
    }
    $('#queryOffer').ajaxForm({success:complate_queryOffer,dataType:'json'});
    function complate_queryOffer(result){
        if(result.errNum === 0){
            alert(result.retData);
            location.reload();
        } else {
            alert(result.errMsg);
        }
    }
</script>
</body>
</html>
