<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{$all_config['seo_default_title']}</title>
    <meta name="description" content="{$all_config['seo_default_keys']}">
    <meta name="keywords" content="{$all_config['seo_default_desc']}">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="renderer" content="webkit">
    <meta http-equiv="Cache-Control" content="no-siteapp" />
    <link href="__ROOT__/static/style_m/css/amazeui.min.css" rel="stylesheet" type="text/css" />
    <link href="__ROOT__/static/font-awesome/css/font-awesome.min.css" rel="stylesheet" type="text/css" />
    <link href="__ROOT__/static/style_m/css/style.css" rel="stylesheet" type="text/css" />
    <script src="__ROOT__/static/style_m/js/jquery-1.10.2.min.js"></script>
    <script src="__ROOT__/static/style_m/js/amazeui.min.js"></script>
    <script src="__ROOT__/static/style_m/js/time.js"></script>
    <script src="__ROOT__/static/jquery-form/jquery.form.js"></script>
    <script type="text/javascript" src="__ROOT__/static/style_pc/layer.js"></script>
    <link type="text/css" rel="stylesheet" href="__ROOT__/static/style_pc/layer.css" id="skinlayercss">
    <script>
        $(function () {
            var elm = $('#shortbar');
            var startPos = $(elm).offset().top;
            $.event.add(window, "scroll", function () {
                var p = $(window).scrollTop();
                if (p > startPos) {
                    elm.addClass('sortbar-fixed');
                } else {
                    elm.removeClass('sortbar-fixed');
                }
            });
        });
    </script>
</head>
<body>
<div style="position: relative;background: #e72919;background-image: url(__ROOT__/static/tuiguang/wap1-1.jpg);background-repeat: no-repeat; background-size: 100% 60rem;">
    <div style="position: absolute;color: #ffffff;top: 6px; left: 10px;">贷款服务专家</div>
    <div style="height: 40rem;"></div>
    <div>
        <!-------------------------------------------------下面是在线申请------------------------------------>
        <style>
            .apply-loan {
                width: 95%;
                height: auto;
                margin: 0 auto;
                border-radius: 0.5rem;
                padding: 1.5rem 0 0.1rem 0;
            }
            .loan-title {
                color: #f4d44d;
            }
            .fz16 {
                font-size: 1.6rem;
            }

            .fz24 {
                font-size: 2.4rem;
                margin-bottom: 1.4rem;
            }
            .tac {
                text-align: center;
            }
            .bg1 {
                background: url(__ROOT__/static/style_m/images/icon_wap1.png) no-repeat 4% -3.5%;
                background-size: 10% 550%;
            }
            .bg3 {
                background: url(__ROOT__/static/style_m/images/icon_wap1.png) no-repeat 5% 75%;
                background-size: 9% 550%;
            }
            .bg2 {
                background: url(__ROOT__/static/style_m/images/icon_wap1.png) no-repeat 4% 35%;
                background-size: 10% 550%;
            }
            .bg4 {
                background: url(__ROOT__/static/style_m/images/icon_l_wap1.png) no-repeat 5% 46%;
                background-size: 9% 70%;
            }
            .loan-in {
                border: 2px solid #f4d44d;
                width: 90%;
                margin: 0 auto;
                height: 4rem;
                border-radius: 1rem;
                margin-bottom: 10px;
            }
            input.inp {
                width: 80%;
                border-radius: 0;
                outline: none;
            }
            input[type="text"], input[type="submit"] {
                -webkit-appearance: none;
                outline: none;
            }
            input[type="text"], input[type="tel"] {
                color: #f4d44d;
            }
            .inp {
                width: 80%;
                height: 84%;
                border: none;
                border-left: 2px solid #f4d44d;
                margin: 0.8% 1% 1% 1%;
                float: right;
                font-size: 1.6rem;
                padding-left: 2%;
            }

            body, input {
                font-family: "microsoft yahei",arial;
                background: transparent;
                font-size: 1.6rem;
            }
            select {
                width: 80%;
                height: 100%;
                color: #f4d44d;
                align-items: center;
                white-space: pre;
                -webkit-rtl-ordering: logical;
                font-family: "microsoft yahei",arial;
                border: none;
                appearance: none;
                -moz-appearance: none;
                -webkit-appearance: none;
                background: url(__ROOT__/static/style_m/images/sel.png) no-repeat 92% 62%;
                background-size: 14% 30%;
                padding-right: 14px;
                border-radius: 0;
                outline: none;
                color: #f4d44d;
            }
            input, textarea, keygen, select, button {
                text-rendering: auto;
                color: initial;
                letter-spacing: normal;
                word-spacing: normal;
                text-transform: none;
                text-indent: 0px;
                text-shadow: none;
                display: inline-block;
                text-align: start;
                margin: 0em 0em 0em 0em;
                font: 13.3333px Arial;
            }
            .input_new .sui {
                height: 4rem;
                line-height: 4rem;
                width: 16%;
                color: #f4d44d;
                float: right;
                border-radius: 0 1rem 1rem 0;
                text-align: center;
                font-size: 1.6rem;
            }
            .input_new .fz19 {
                width: 64%;
                height: 3rem;
                margin: 0.8% 1% 1% 5%;
                outline: none;
                padding-left: 2%;
                float: right;
                font-size: 1.6rem;
            }
            .insur {
                width: 96%;
                margin: 10px auto;
                position: relative;
                margin-top: 12px;
            }
            .insur .check_left {
                position: absolute;
                border: 1px #f4d44d solid;
                z-index: 99;
                top: 2px;
                left: 0;
                display: inline-block;
                width: 14px;
                height: 14px;
                outline: 0!important;
                background-color: transparent;
                -webkit-appearance: none;
            }
            .insur .check_left img {
                width: 100%;
                height: 100%;
            }
            .insur .mui-card-content-inner {
                padding: 0 0 0 18px;
                line-height: 20px;
            }
            .insur .mui-card-content-inner a {
                color: #f4d44d;
            }
            input[type="text"], input[type="submit"] {
                -webkit-appearance: none;
                outline: none;
            }
            .loan-sub {
                background: #f4d44d;
                color: #000000;
                text-align: center;
                margin-left: 5%;
                margin-bottom: 1.5rem;
                font-size: 2rem;
                font-weight: bold;;
                box-shadow: 1px 5px 3px #858585;
            }
            input::-webkit-input-placeholder{color:#f4d44d;}
            option{color: #000000;}
        </style>
        <div class="apply-loan mui-input-group1" id="apply-loan-first" style="display:block">
            <form id="queryOffer" name="info_form" action="{:U('Action/apply_mobile')}" method="post">
                <div class="loan-in bg1">
                    <input type="text" class="inp fz18 want_clear" placeholder="请输入您的姓名" id="name" name="name">
                </div>
                <div class="loan-in bg3">
                    <div class="inp">
                        <select name="city" class="selects fz18 want_clear" style="color: #f4d44d">
                            <option value="">所在城市</option>
                            <foreach name="customer_apply_city" item="val">
                                <option value="{$val}">{$val}</option>
                            </foreach>
                        </select>
                    </div>
                </div>
                <div class="loan-in bg2">
                    <input type="tel" class="inp fz18 want_clear" placeholder="请输入您的手机号码" id="mobile" name="mobile" style="color:#f4d44d">
                </div>
                <div class="loan-in bg4 input_new">
                    <span class="sui">万</span>
                    <input type="tel" class="inp fz19 want_clear" placeholder="请输入您的贷款金额" id="loanmoney" name="money" style="color:#f4d44d">
                </div>
                <div class="loan-in mb14" style="margin-bottom: 1.3rem;position: relative;">
                    <i class="fa fa-sign-in" style="position: absolute; left: 1rem;color: #f4d44d;font-size: 40px;"></i>
                    <div class="fz16 styti input_new" style="line-height: 4rem;width: 50%;float: left;padding: 0 5%;">
                        <input type="text" class="inp fz19 want_clear" placeholder="验证码" name="code" style="color:#f4d44d">
                    </div>
                    <img id="shenqing_code1" src="{:U('Action/make_code')}" style="width:50%;height: 42px;" onclick="RefreshCode('shenqing_code1')">
                </div>
                <div class="insur mui-checkbox mui-left" style="width: 90%;">
                    <p class="mui-card-content-inner"><input type="checkbox" name="services" checked="checked ">本人已阅读并同意<a href="{:U('mobile/index/article',array('id'=>'2875'))}" id="btn_sec">《服务协议》</a></p>
                </div>
                <input type="hidden" name="channel" value="1">
                <input type="submit" class="loan-in loan-sub ljpd1" value="立即申请">
            </form>
        </div>
        <script>
            $('#queryOffer').ajaxForm({success:complate_queryOffer,dataType:'json'});
            function complate_queryOffer(result){
                if(result.errNum === 0){
                    $('.want_clear').val('');
                    RefreshCode('shenqing_code1');
                    layer.msg(result.retData, 2, 1);
                } else {
                    RefreshCode('shenqing_code1');
                    layer.msg(result.errMsg);
                }
            }
            function RefreshCode(id){
                //重载验证码
                var url = "{:U('Action/make_code')}?r="+Math.floor(Math.random()*10000);
                $('#'+id).attr('src',url);
            }
        </script>
    </div>
    <img src="__ROOT__/static/tuiguang/wap1-2.jpg" width="100%">
</div>
</body>
</html>
