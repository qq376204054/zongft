<!DOCTYPE html>
<html style="font-size: 93.3333px;">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="renderer" content="webkit">
    <title>{$all_config['seo_default_title']}</title>
    <meta name="description" content="{$all_config['seo_default_keys']}">
    <meta name="keywords" content="{$all_config['seo_default_desc']}">
    <meta name="viewport" content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,initial-scale=1.0,user-scalable=no">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta http-equiv="Expires" content="-1">
    <meta http-equiv="pragram" content="no-cache">
    <link href="__ROOT__/static/wap12_1/new-common.css" rel="stylesheet" type="text/css">
    <link href="__ROOT__/static/wap12_1/index1.css" rel="stylesheet" type="text/css">
    <link href="__ROOT__/static/wap12_1/layui.css" rel="stylesheet" type="text/css">
    <link href="__ROOT__/static/wap12_1/layer.css" rel="styleSheet" type="text/css">
    <link href="__ROOT__/static/wap12_1/style1.css" rel="styleSheet" type="text/css">
    <script src="__ROOT__/static/wap12_1/common.js" type="text/javascript"></script>
    <script src="__ROOT__/static/wap12_1/jquery-2.1.4.min.js" type="text/javascript"></script>
    <script src="__ROOT__/static/wap12_1/layer.js" type="text/javascript"></script>
    <style>
        .cc option{
            padding-left: 1rem;
        }
    </style>
</head>

<body style="background: #ffffff;">
<img src="__ROOT__/static/wap12_1/bg4.jpg" class="top_logo" alt="" style="margin-bottom: 0.5rem">
<section class="main" style="background: #ffffff;">
    <div class="bgimg">
        <div class="infodiv">
            <div class="wrapper">
                <img class="icon_w" src="__ROOT__/static/wap12_1/dingwei.png" style="position: absolute;width: 0.6rem;height: 0.6rem;top: 0.15rem;left: 0;">
                <select id="city" name="city" class="cc">
                    <option selected="selected" value="">请选择您的城市</option>
                    <foreach name="customer_apply_city" item="city">
                        <option value ="{$city}">{$city}</option>
                    </foreach>
                </select>
            </div>
            <div class="wrapper">
                <img class="icon_w" src="__ROOT__/static/wap12_1/yonghu.png" style="position: absolute;width: 0.6rem;height: 0.6rem;top: 0.15rem;left: 0;">
                <input id="name" name="name" maxlength="20" class="name" placeholder="请输入您的姓名" type="text">
            </div>
            <div class="wrapper">
                <img class="icon_w" src="__ROOT__/static/wap12_1/shouji.png" style="position: absolute;width: 0.6rem;height: 0.6rem;top: 0.15rem;left: 0;">
                <input id="mobile" name="mobile" maxlength="11" class="phone" placeholder="请输入您的手机号码" type="text">
            </div>
            <div class="wrapper">
                <img class="icon_w" src="__ROOT__/static/wap12_1/qian.png" style="position: absolute;width: 0.6rem;height: 0.6rem;top: 0.15rem;left: 0;">
                <select id="money" name="money" class="cc">
                    <option value ="">请选择贷款金额</option>
                    <option value ="5">5万元</option>
                    <option value ="10">10万元</option>
                    <option value ="20">20万元</option>
                    <option value ="30">30万元</option>
                    <option value ="50">50万元</option>
                    <option value ="60">50万元以上</option>
                </select>
            </div>
            <div class="wrapper">
                <img class="icon_w" src="__ROOT__/static/wap12_1/dun.png" style="position: absolute;width: 0.6rem;height: 0.6rem;top: 0.15rem;left: 0;">
                <input type="text" id="code" name="code" class="captcha" maxlength="6" placeholder="输入验证码">
                <input type="button" value="获取验证码" class="obtainCode getCode">
            </div>
            <div id="wrap">
                <input value="提交" name="zntjan" id="zntjan" type="button" class="ui-submit-btn">
            </div>
        </div>
    </div>
</section>
<div style="margin-top: 20px;">
    <div class="line_agg">
        <input id="services" class="inputCheck" type="checkbox" name="services" checked="">
        <div class="mark goAgreement">我已阅读并同意《用户服务和隐私条款》</div>
    </div>
    <div class="line_agg">
        <input id="services1" class="inputCheck1" type="checkbox" name="services1" checked="">
        <div class="mark">为了更好的为你提供贷款服务，您同意我司将您的个人信息分享与我司合作的资金方及助贷机构</div>
    </div>
</div>
<footer class="copyright" style="background: #ffffff;">
    <center><img src="__ROOT__/static/wap12_1/footer1.jpg" style="max-width:100%; height:auto;margin-top: 20px;"></center>
</footer>
<script>
    var sec=60;
    $('.getCode').click(function(){
        if($(this).val()=='获取验证码'){
            var myreg = /^((1{1})+\d{10})$/;
            var mobile=$('#mobile').val();
            if(!myreg.test(mobile)) {
                layer.open({
                    content: '请输入有效的手机号码'
                    ,btn: '确定'
                });
                return false;
            }
            $('.getCode').val("获取中...");
            $.ajax({
                type:"post",
                url:"{:U('Action/make_mobile_code')}",
                data:{
                    mobile:mobile,
                },
                dataType:"json",
                success:function(data){
                    if(data.errNum===0){
                        time();
                        sec=60;
                    }else{
                        layer.open({
                            content: data.errMsg
                            ,btn: '确定'
                        });
                        $('.getCode').val("获取验证码");
                    }
                },
                error:function(){
                    layer.open({
                        content: '系统异常，请稍后重试！'
                        ,btn: '确定'
                    });
                    $('.getCode').val("获取验证码");
                }
            });
        }
    });
    function time()
    {
        if(sec>0){
            $('.getCode').val(sec+'秒');
            sec=sec-1;
            setTimeout(time,1000);
        }else{
            $('.getCode').val('获取验证码');
        }
    }
    $('.ui-submit-btn').click(function(){
        if($('.ui-submit-btn').val()=='提交'){
            $('.ui-submit-btn').val("申请中...");
            $.ajax({
                type:"post",
                url:"{:U('Action/apply_mobile')}",
                data:{
                    city:$('#city').val(),
                    name:$('#name').val(),
                    money:$('#money').val(),
                    mobile:$('#mobile').val(),
                    code:$('#code').val(),
                    services:$('#services').val(),
                    channel:"12",
                },
                dataType:"json",
                success:function(data){
                    if(data.errNum===0){
                        $('.ui-submit-btn').val("提交");
                        alert(data.retData);
                        location.reload();
                    }else{
                        layer.open({
                            content:data.errMsg
                            ,btn: '确定'
                        });
                        $('.ui-submit-btn').val("提交");
                    }
                },
                error:function(){
                    layer.open({
                        content:"系统异常，请稍后重试！"
                        ,btn: '确定'
                    });
                    $('.ui-submit-btn').val("提交");
                }
            });
        }
    });
    $(".goAgreement").click(function(){
        window.location.href="{:U('mobile/index/article',array('id'=>'2875'))}";
    })
</script>
</body>
