<body>
<div class="w640 main" id="form_main" style="display: table;">
    <form id="form1">
        <div class="form_top">
            <p>
                <img src="__ROOT__/static/wap18/images/top.jpg">
            </p>
        </div>
        <div class="form_box_c">
            <div class="form_box ">
                <h1>填写信息 获取额度</h1>
                <div class="i-wrap">
                    <li>
                        <input type="text" class="text" name="mobile" id="mobile" placeholder="您的手机号">
                    </li>
                    <li>
                        <input type="text" class="text" oninput="if(value.length&gt;4) value = value.slice(0,4)" id="code" name="code" placeholder="手机验证码">
                        <input id="i-code" style="border: 1px solid #fff" type="button" name="p" value="获取验证码" onclick="sms();">
                    </li>
                </div>
                <div class="i-wrap">
                    <input type="hidden" name="channel" value="18">
                    <input type="button" id="submit" onclick="check()" value="测测你的额度">
                </div>
            </div>
        </div>
        <p style="text-align: center; padding: 10px; color: #666;font-size:16px;margin-top: 20px;">
            贷款有风险，借款需谨慎<br>
            请根据个人能力合理贷款，理性消费，避免逾期<br>
            资源来源：正规金融机构<br>
            金融服务将根据您的个人情况由适合的正规金融机构提供
        </p>
    </form>
</div>
<script type="text/javascript">
    var phoneWidth = parseInt(window.screen.width)
    var phoneScale = phoneWidth/640
    var ua = navigator.userAgent
    if (/Android (\d+\.\d+)/.test(ua)){
        var version = parseFloat(RegExp.$1)
        if(version>2.3){
            document.write('<meta name="viewport" content="width=640, minimum-scale = '+phoneScale+', maximum-scale = '+phoneScale+', target-densitydpi=device-dpi">')
        }else{
            document.write('<meta name="viewport" content="width=640, target-densitydpi=device-dpi">')
        }
    } else {
        document.write('<meta name="viewport" content="width=640, user-scalable=no, target-densitydpi=device-dpi">')
    }
    //表单提交操作
    $(function(){
        $('#submit').click(function () {
            var mobile = $("#mobile").val();
            var regMobile = /(^1[3|4|5|6|7|8|9][0-9]{9}$)/;
            if(mobile == ''){
                return layer.msg("手机号码不能为空", {icon: 2});
            }
            if (mobile!="" && !regMobile.test(mobile)) {
                return layer.msg("手机号码格式不正确", {icon: 2});
            }
            $.ajax({
                type: "post",
                url: "{:U('Action/apply_mobile')}",
                data: $("#form1").serialize(),
                dataType:"json",
                success:function(data){
                    dsp.track('form', {convert_id: '210219193036996'});
                    if(data.errNum===0){
                        window.location.href = "{:U('mobile/index/success')}";
                    }else{
                        layer.msg(data.errMsg, {icon: 2});
                    }
                }
            })
        })
    });
    //发送验证码
    function sms(){
        var mobile = $('#mobile').val();
        var regMobile = /(^1[3|4|5|6|7|8|9][0-9]{9}$)/;
        if(mobile!=""){
            if (!regMobile.test(mobile)) {
                layer.msg("手机号码格式不正确", {icon: 2});
                $('#mobile').focus();
            } else {
                $.ajax({
                    type: "post",
                    url: "{:U('Action/make_mobile_code')}",
                    data: {mobile: mobile},
                    dataType:"json",
                    success:function(data){
                        if(data.errNum===0){
                            layer.msg('短信发送成功', {icon: 1});
                        }else{
                            layer.msg(data.errMsg, {icon: 2});
                            $('.getCode').text("获取验证码");
                        }
                    }
                });
                pp();
            }
        }else{
            layer.msg('请输入手机号！', {icon: 2});
            $('#mobile').focus();
        }
    }
    //倒计时按钮
    function pp(){
        document.all.p.disabled = true;
        speed = 1000; //速度
        wait = 60; //停留时间
        updateinfo();
    }
    function updateinfo(){
        if(wait == 0){
            document.all.p.value = "获取验证码";
            document.all.p.disabled = false;
        }else{
            document.all.p.value = wait+"s";
            wait--;
            window.setTimeout("updateinfo()",speed);
        }
    }
</script>
</body>
</html>
