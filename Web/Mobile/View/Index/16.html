<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{$all_config['seo_default_title']}</title>
    <meta name="description" content="{$all_config['seo_default_keys']}">
    <meta name="keywords" content="{$all_config['seo_default_desc']}">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta content="telephone=no" name="format-detection" />
    <meta content="email=no" name="format-detection" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="renderer" content="webkit|ie-comp|ie-stand">
    <meta http-equiv="X-UA-Compatible" content="IE=6">
    <meta http-equiv="X-UA-Compatible" content="IE=7">
    <meta http-equiv="X-UA-Compatible" content="IE=8">
    <meta name="HandheldFriendly" content="true">
    <link href="__ROOT__/static/wap15/css/gdt.css" rel="stylesheet">
</head>
<body>
<div class="w640 main" id="form_main">
    <form method="post" id="form1">
        <p><img src="__ROOT__/static/wap15/images/top.jpg"></p>
        <div class="i-wrap" style="padding: 0px;margin-top: 32px;">
            <li class="l1">
                <input type="text" class="text" name="name" id="customname"  placeholder="您的姓名">
                <input type="radio" id="man" class="radio" name="sex" value="男" checked><label class="label-1" for="man">男</label>
                <input type="radio" id="woman" class="radio" name="sex" value="女"><label class="label-1" for="woman">女</label>
            </li>
            <li class="l2">
                <select id="city" name="city" onchange="set_hide(this.value);">
                    <option value="">请选择所在城市</option>
                    <foreach name="customer_apply_city" item="city">
                        <option value ="{$city}">{$city}</option>
                    </foreach>
                </select>
            </li>
            <li class="l2">
                <select id="amount" name="money" onchange="set_hide(this.value);">
                    <option value="">请选择借款金额</option>
                    <option value="3">3万</option>
                    <option value="5">5万</option>
                    <option value="10">10万</option>
                    <option value="15">15万</option>
                    <option value="20">20万</option>
                    <!--<option value="30">30万</option>-->
                    <!--<option value="50">50万</option>-->
                    <!--<option value="100">100万</option>-->
                    <!--<option value="200">200万</option>-->
                    <!--<option value="500">500万</option>-->
                </select>
            </li>
            <li>
                <input type="text" class="text" name="mobile" id="mobile" placeholder="您的手机号">
            </li>
        </div>
        <div class="i-wrap-1">
            <input type="checkbox" class="checkbox" id="check1" name="has_house" value="有"><label class="checkbox-1 ml0" for="check1">我有房</label>
            <input type="checkbox" class="checkbox" id="check2" name="has_car" value="有"><label class="checkbox-1" for="check2">我有车</label>
            <input type="checkbox" class="checkbox" id="check3" name="has_baodan" value="有"><label class="checkbox-1" for="check3">有寿险保单</label>
            <!--<input type="checkbox" class="checkbox" id="check8" name="has_job"  value="有"><label class="checkbox-1 ml0" for="check8">有工作</label>-->
            <!--<input type="checkbox" class="checkbox" id="check9" name="shebao" value="有"><label class="checkbox-1" for="check9">有社保</label>-->
            <input type="checkbox" class="checkbox" id="check4" name="has_gongjijin" value="有"><label class="checkbox-1 ml0" for="check4">有公积金</label>
            <!--<input type="checkbox" class="checkbox" id="check7" name="has_credit_card" value="有"><label class="checkbox-1 ml0" for="check7">有信用卡</label>-->
            <input type="checkbox" class="checkbox" id="check5" name="has_weilidai" value="有"><label class="checkbox-1" for="check5">有微粒贷</label>
            <input type="checkbox" class="checkbox" id="check6" name="has_nasui" value="有"><label class="checkbox-1" for="check6">有纳税</label>
        </div>
        <div class="i-wrap" style="padding: 0px;margin-top: 30px;margin-bottom: 20px;">
            <input type="button" id="submit" value="立 即 申 请" style="margin-bottom: 5px;">
            <p style="text-align: center; padding: 10px; font-size: 12px">
                点击“立即申请”表示阅读并同意<a href="javascript:;" id="agreedmentBt" style="color: orange">《用户服务及隐私协议》</a>
            </p>
        </div>
        <input type="hidden" name="channel" value="16">
        <p><img src="__ROOT__/static/wap15/images/footer.jpg"></p>
    </form>
</div>

<script type="text/javascript" src="__ROOT__/static/wap15/js/jquery-1.8.2.min.js"></script>
<script type="text/javascript" src="__ROOT__/static/wap15/layer/layer.js"></script>
<script type="text/javascript">
    var phoneWidth = parseInt(window.screen.width)
    var phoneScale = phoneWidth/640
    var ua = navigator.userAgent
    if (/Android (\d+\.\d+)/.test(ua)){
        var version = parseFloat(RegExp.$1)
        if(version>2.3){
            document.write('<meta name="viewport" content="width=640, minimum-scale = '+phoneScale+', maximum-scale = '+phoneScale+', target-densitydpi=device-dpi">')
        }else{
            document.write('<meta name="viewport" content="width=640, target-densitydpi=device-dpi">')
        }
    } else {
        document.write('<meta name="viewport" content="width=640, user-scalable=no, target-densitydpi=device-dpi">')
    }

    $(function(){
        $(".hide").hide();
        //用户服务及隐私协议
        $('#agreedmentBt').click(function () {
            layer.open({
                title:'用户服务及隐私协议',
                type: 2,
                skin: 'layui-layer-rim', //加上边框
                area: ['80%', '80%'], //宽高
                content: "{:U('mobile/index/article',array('id'=>'2875'))}"
            });
        });
        //表单提交
        $('#submit').click(function () {
            var name = $("#customname").val();
            var city = $("#city").val();
            var money = $("#amount").val();
            var mobile = $("#mobile").val();
            var regName = /^[\u4e00-\u9fa5]{2,4}$/;
            var regMobile = /(^1[3|4|5|6|7|8|9][0-9]{9}$)/;
            // 表单输入验证
            if(name == ''){
                return layer.msg("姓名不能为空", {icon: 2});
            }
            if (city == "") {
                return layer.msg("请选择所在城市", {icon: 2});
            }
            if(money == ''){
                return layer.msg("请选择借款金额", {icon: 2});
            }
            if(mobile == ''){
                return layer.msg("手机号码不能为空", {icon: 2});
            }
            if (mobile!="" && !regMobile.test(mobile)) {
                return layer.msg("手机号码格式不正确", {icon: 2});
            }
            if (!$("input[type='checkbox']").is(':checked')){
                return layer.msg("请至少选择一项资质", {icon: 2});
            }
            $.ajax({
                type: "post",
                url: "{:U('Action/apply_mobile')}",
                data: $("#form1").serialize(),
                dataType:"json",
                success:function(data){
                    if(data.errNum===0){
                        window.location.href = "{:U('mobile/index/success')}";
                    }else{
                        layer.msg(data.errMsg, {icon: 2});
                    }
                }
            })
        })
    });
    //隐藏选项
    function set_hide(v){
        if(v!=""){
            $(".hide").show();
        }else{
            $(".hide").hide();
        }
    }
</script>
</body>
</html>
