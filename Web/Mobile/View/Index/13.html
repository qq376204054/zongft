<!DOCTYPE html>
<html style="font-size: 93.3333px;">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="renderer" content="webkit">
    <title>{$all_config['seo_default_title']}</title>
    <meta name="description" content="{$all_config['seo_default_keys']}">
    <meta name="keywords" content="{$all_config['seo_default_desc']}">
    <meta name="viewport" content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,initial-scale=1.0,user-scalable=no">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta http-equiv="Expires" content="-1">
    <meta http-equiv="pragram" content="no-cache">
    <link href="__ROOT__/static/wap13/new-common.css" rel="stylesheet" type="text/css">
    <link href="__ROOT__/static/wap13/index1.css" rel="stylesheet" type="text/css">
    <link href="__ROOT__/static/wap13/layui.css" rel="stylesheet" type="text/css">
    <link href="__ROOT__/static/wap13/layer.css" rel="styleSheet" type="text/css">
    <link href="__ROOT__/static/wap13/style1.css" rel="styleSheet" type="text/css">
    <script src="__ROOT__/static/wap13/common.js" type="text/javascript"></script>
    <script src="__ROOT__/static/wap13/jquery-2.1.4.min.js" type="text/javascript"></script>
    <script src="__ROOT__/static/wap13/layer.js" type="text/javascript"></script>
    <style>
        .cc option{
            padding-left: 1rem;
        }
    </style>
</head>

<body style="background: #ffffff;">
<img src="__ROOT__/static/wap13/bg1.jpg" class="top_logo" alt="" style="margin-bottom: 0.5rem">
<section class="main" style="background: #ffffff;">
    <div class="bgimg">
        <div class="infodiv">
            <div class="wrapper">
                <img class="icon_w" src="__ROOT__/static/wap13/dingwei.png" style=" position: absolute; width: 0.5rem; height: 0.5rem; top: 0.15rem; left: 0.38rem;">
                <select id="city" name="city" class="cc">
                    <option selected="selected" value="">请选择您的城市</option>
                    <foreach name="customer_apply_city" item="city">
                        <option value ="{$city}">{$city}</option>
                    </foreach>
                </select>
            </div>
            <div class="wrapper">
                <img class="icon_w" src="__ROOT__/static/wap13/yonghu.png" style=" position: absolute; width: 0.5rem; height: 0.5rem; top: 0.15rem; left: 0.38rem;">
                <input id="name" name="name" maxlength="20" class="name" placeholder="请输入您的姓名" type="text">
            </div>
            <div class="wrapper">
                <img class="icon_w" src="__ROOT__/static/wap13/shouji.png" style=" position: absolute; width: 0.5rem; height: 0.5rem; top: 0.15rem; left: 0.38rem;">
                <input id="mobile" name="mobile" maxlength="11" class="phone" placeholder="请输入您的手机号码" type="text">
            </div>
            <div class="wrapper">
                <img class="icon_w" src="__ROOT__/static/wap13/qian.png" style=" position: absolute; width: 0.5rem; height: 0.5rem; top: 0.15rem; left: 0.38rem;">
                <select name="money" id="money" class="cc">
                    <option selected="selected" value="">请选择贷款金额(万元)</option>
                    <option value="5">5万</option>
                    <option value="10">10万</option>
                    <option value="20">20万</option>
                    <option value="30">30万</option>
                    <option value="50">50万</option>
                    <option value="100">50万以上</option>
                </select>
                <!--<input id="money" name="money" maxlength="11" class="phone" placeholder="请输入贷款金额(万元)" type="text">-->
            </div>
            <div class="wrapper">
                <img class="icon_w" src="__ROOT__/static/wap13/dun.png" style=" position: absolute; width: 0.5rem; height: 0.5rem; top: 0.15rem; left: 0.38rem;">
                <input type="text" id="code" name="code" class="captcha" maxlength="6" placeholder="输入验证码">
                <div class="obtainCode getCode" style='line-height:38px;color:#ffffff;text-align:center;width:120px;height:38px;position:absolute;right:0;top:0;background-image: url("__ROOT__/static/wap13/yanzhengmabutton.jpg");background-repeat: no-repeat;background-size: 100% 100%;'>获取验证码</div>
            </div>
            <div id="wrap">
                <div style='background-image: url("__ROOT__/static/wap13/button1.jpg");background-repeat: no-repeat;background-size: 100% 100%;
                width: 100%;height:38px;line-height:38px;font-size: 18px;color:#ffffff;text-align: center;margin-top: 25px;' id="ui-submit-btn">提交</div>
            </div>
        </div>
    </div>
</section>
<footer class="copyright" style="background: #ffffff;margin-top: 30px;">
    <center><img src="__ROOT__/static/wap13/footer4.jpg" style="max-width:100%; height:auto;margin-top: 20px;"></center>
</footer>
<script>
    var sec=60;
    $('.getCode').click(function(){
        if($(this).text()=='获取验证码'){
            var myreg = /^((1{1})+\d{10})$/;
            var mobile=$('#mobile').val();
            if(!myreg.test(mobile)) {
                layer.open({
                    content: '请输入有效的手机号码'
                    ,btn: '确定'
                });
                return false;
            }
            $('.getCode').text("获取中...");
            $.ajax({
                type:"post",
                url:"{:U('Action/make_mobile_code')}",
                data:{
                    mobile:mobile,
                },
                dataType:"json",
                success:function(data){
                    if(data.errNum===0){
                        time();
                        sec=60;
                    }else{
                        layer.open({
                            content: data.errMsg
                            ,btn: '确定'
                        });
                        $('.getCode').text("获取验证码");
                    }
                },
                error:function(){
                    layer.open({
                        content: '系统异常，请稍后重试！'
                        ,btn: '确定'
                    });
                    $('.getCode').text("获取验证码");
                }
            });
        }
    });
    function time()
    {
        if(sec>0){
            $('.getCode').text(sec+'秒');
            sec=sec-1;
            setTimeout(time,1000);
        }else{
            $('.getCode').text('获取验证码');
        }
    }
    $('#ui-submit-btn').click(function(){
        if($('#ui-submit-btn').text()=='提交'){
            $('#ui-submit-btn').text("申请中...");
            $.ajax({
                type:"post",
                url:"{:U('Action/apply_mobile')}",
                data:{
                    city:$('#select_city').val(),
                    name:$('#name').val(),
                    money:$('#money').val(),
                    mobile:$('#mobile').val(),
                    code:$('#code').val(),
                    services:$('#services').val(),
                    channel:"13",
                },
                dataType:"json",
                success:function(data){
                    if(data.errNum===0){
                        $('#ui-submit-btn').text("提交");
                        $('#city').val('');
                        $('#name').val('');
                        $('#money').val('');
                        $('#mobile').val('');
                        $('#code').val('');
                        $('.getCode').text('获取验证码');
                        sec=1;
                    }else{
                        layer.open({
                            content:data.errMsg
                            ,btn: '确定'
                        });
                        $('#ui-submit-btn').text("提交");
                    }
                },
                error:function(){
                    layer.open({
                        content:"系统异常，请稍后重试！"
                        ,btn: '确定'
                    });
                    $('#ui-submit-btn').text("提交");
                }
            });
        }
    });
</script>
</body>
