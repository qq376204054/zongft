<volist name="left_menu" id="val" >
	<h3 class="f14"><i class="fa fa-{$val.icon}"></i> {$val.name}</h3>
	<ul>
		<volist name="val['sub']" id="sval" >
			<if condition="($sval['module_name'] eq 'http') || ($sval['module_name'] eq 'https')">
				<li class="sub_menu"><a href="javascript:;" data-uri="{$sval['action_name']}{$sval.data}" data-id="{$sval.id}" hidefocus="true"><i class="fa fa-{$sval.icon}"></i> {$sval.name}</a></li>
				<else/>
				<li class="sub_menu"><a href="javascript:;" data-uri="{:U($sval['module_name'].'/'.$sval['action_name'], array('menuid'=>$sval['id']))}{$sval.data}" data-id="{$sval.id}" hidefocus="true"><i class="fa fa-{$sval.icon}"></i> {$sval.name}</a></li>
			</if>
		</volist>
	</ul>
</volist>
