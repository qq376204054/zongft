<div class="dialog_content">
    <form id="info_form" name="info_form" action="{:U('add_user')}" method="post">
        <table width="100%" class="table_form">
            <tr>
                <th>手机号 :</th>
                <td><input type="text" name="mobile" id="add_mobile" class="input-text"></td>
            </tr>
        </table>
    </form>
</div>
<script>
    $(function(){
        $.formValidator.initConfig({formid:"info_form",autotip:true});
        $("#add_mobile").formValidator({ onshow:lang.please_input+'后台用户手机号', onfocus:lang.please_input+'后台用户手机号', oncorrect:lang.input_right}).inputValidator({ min:1, onerror:lang.please_input+'后台用户手机号'});
        $('#info_form').ajaxForm({success:complate,dataType:'json'});
        function complate(result){
            if(result.errNum === 0){
                $.dialog.get('add_user').close();
                $.yhxia.tip({content:result.retData});
                window.location.reload();
            } else {
                $.yhxia.tip({content:result.errMsg, icon:'alert'});
            }
        }
    })
</script>
