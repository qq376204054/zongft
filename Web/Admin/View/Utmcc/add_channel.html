<div class="dialog_content">
    <form id="info_form" name="info_form" action="{:U('add_channel')}" method="post">
        <table width="100%" class="table_form">
            <input type="hidden" name="pid" class="input-text" value="{$pid}">
            <tr>
                <th>渠道名 :</th>
                <td><input type="text" name="channel" id="add_channel" class="input-text"></td>
            </tr>
        </table>
    </form>
</div>
<script>
    $(function(){
        $.formValidator.initConfig({formid:"info_form",autotip:true});
        $("#add_channel").formValidator({ onshow:lang.please_input+'渠道名', onfocus:lang.please_input+'渠道名', oncorrect:lang.input_right}).inputValidator({ min:1, onerror:lang.please_input+'渠道名'});
        $('#info_form').ajaxForm({success:complate,dataType:'json'});
        function complate(result){
            if(result.errNum === 0){
                $.dialog.get('add_child').close();
                $.yhxia.tip({content:result.retData});
                window.location.reload();
            } else {
                $.yhxia.tip({content:result.errMsg, icon:'alert'});
            }
        }
    })
</script>
