<include file="Login:header" />
<div class="pad_lr_10" >

    <!--下面是客户情况报表-->
    <div style="background: #333333;line-height: 35px;color: #ffffff;padding-left: 25px;font-size: 16px;font-weight: bold;">客户情况报表(单位为个)</div>
    <form id="info_form3" name="info_form" action="{:U('customer_table')}" method="get">
        <table width="100%" cellspacing="0" class="search_form">
            <tbody>
            <tr>
                <td>
                    <div class="explain_col">
                        姓名：
                        <input type="text" name="user_name" id="customer_user_name" class="input-text" size="12" value="">
                        在职状态 :
                        <select name="user_delete" id="report_user_delete">
                            <option value="1">在职</option>
                            <option value="2">离职</option>
                            <option value="3">全部</option>
                        </select>
                        客户创建时间：
                        <input type="text" name="start_time" id="customer_time_start" class="date" size="12" value="" readonly>
                        -
                        <input type="text" name="end_time" id="customer_time_end" class="date" size="12" value="" readonly>
                        <if condition="$is_show_branch_select">
                            公司部门：
                            <select name="branch_id" id="report_branch_id">
                                <option value="">全部</option>
                                {$select_menus}
                            </select>
                        </if>
                        <input type="submit" name="search" class="btn" value="搜索" />
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </form>
    <div style="padding: 5px; margin: 5px 0px;background: #c287ff;color: #ffffff;">
        本表是根据客户的创建的时间为维度来统计的
    </div>
    <div class="J_tablelist customer_table_list table_list"></div>

</div>
<include file="Login:footer" />
<link rel="stylesheet" type="text/css" href="__ROOT__/static/js/calendar/calendar-blue.css"/>
<script src="__ROOT__/static/js/calendar/calendar.js"></script>
<script>
    //    客户的控件
    Calendar.setup({
        inputField : "customer_time_start",
        ifFormat   : "%Y-%m-%d",
        showsTime  : false,
        timeFormat : "24"
    });
    Calendar.setup({
        inputField : "customer_time_end",
        ifFormat   : "%Y-%m-%d",
        showsTime  : false,
        timeFormat : "24"
    });

    loadURL("{:U('customer_table')}",'.customer_table_list');
    $('#info_form3').ajaxForm({success:complate3,dataType:'html'});
    function complate3(result){
        $('.customer_table_list').html(result);
    }
</script>
</body>
</html>
