<table width="100%" cellspacing="0">
    <thead>
    <tr>
        <th align="left">名称</th>
        <th align="left">状态</th>
        <th align="left">部门</th>
        <volist name="level_arr" id="val" >
            <th align="left">{$level_arr_name[$val]}</th>
        </volist>
    </tr>
    </thead>
    <tbody>
    <volist name="list" id="val" >
        <tr>
            <td align="left">{$val.user_name}</td>
            <td align="left">{$val.status_name}</td>
            <td align="left">{$val.branch_name}</td>
            <volist name="val['list']" id="val_child" >
                <th align="left">{$val_child}</th>
            </volist>
        </tr>
    </volist>
    </tbody>
</table>
