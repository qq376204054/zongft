<include file="Login:header" />
<div class="pad_lr_10" >
    <form id="info_form" name="info_form" action="{:U('account_table')}" method="get">
        <table width="100%" cellspacing="0" class="search_form">
            <tbody>
            <tr>
                <td>
                    <div class="explain_col">
                        姓名：
                        <input type="text" name="user_name" id="report_user_name" size="12" class="input-text" value="{$user_name}">
                        在职状态 :
                        <select name="user_delete" id="report_user_delete">
                            <option value="1">在职</option>
                            <option value="2">离职</option>
                            <option value="3">全部</option>
                        </select>
                        账单支付时间：
                        <input type="text" name="start_time" id="time_start" class="date" size="12" value="{$start_time}" readonly>
                        -
                        <input type="text" name="end_time" id="time_end" class="date" size="12" value="{$end_time}" readonly>
                        <if condition="$is_show_branch_select">
                            公司部门：
                            <select name="branch_id" id="report_branch_id">
                                <option value="">全部</option>
                                {$select_menus}
                            </select>
                        </if>
                        <input type="submit" id="tijiao" name="search" class="btn" value="搜索" />
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </form>
    <div style="padding: 5px; margin: 5px 0px;background: #c287ff;color: #ffffff;">
        本表是根据账单中填写的的支付时间为维度来统计的
    </div>

    <div class="J_tablelist table_list">


    </div>
</div>
<include file="Login:footer" />
<link rel="stylesheet" type="text/css" href="__ROOT__/static/js/calendar/calendar-blue.css"/>
<script src="__ROOT__/static/js/calendar/calendar.js"></script>
<script>
    Calendar.setup({
        inputField : "time_start",
        ifFormat   : "%Y-%m-%d",
        showsTime  : false,
        timeFormat : "24"
    });
    Calendar.setup({
        inputField : "time_end",
        ifFormat   : "%Y-%m-%d",
        showsTime  : false,
        timeFormat : "24"
    });
    //默认加载交易
    loadURL("{:U('account_table')}?user_delete="+$('#report_user_delete').val()+"&user_name="+$('#report_user_name').val()+"&branch_id="+$('#report_branch_id').val()+"&start_time="+$('#time_start').val()+"&end_time="+$('#time_end').val(),'.J_tablelist');
    //下面是数据提交
    $('#info_form').ajaxForm({success:complate,dataType:'html'});
    function complate(result){
        $('.J_tablelist').html(result);
    }
</script>
</body>
</html>
