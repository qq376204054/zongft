<include file="Login:header" />
<!--菜单列表-->
<div class="pad_lr_10">
    <form name="searchform" method="get" >
        <table width="100%" cellspacing="0" class="search_form">
            <tbody>
            <tr>
                <td>
                    <div class="explain_col">
                        城市 :
                        <input name="city" type="text" class="input-text" size="10" value="{$search.city}" />
                        <input type="submit" name="search" class="btn" value="搜索" />
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </form>
    <div class="J_tablelist table_list" data-acturi="{:U('Companybranch/ajax_edit')}">
        <table width="100%" cellspacing="0">
            <thead>
            <tr>
                <th width="40"><input type="checkbox" name="checkall" class="J_checkall"></th>
                <th width="40"><span tdtype="order_by" fieldname="id">ID</span></th>
      			<th style="text-align: left;">部门名</th>
                <th style="text-align: left;">城市</th>
                <th width="190">积分</th>
                <th style="text-align: left;">备注</th>
                <th style="text-align: left;">管理者</th>
                <th style="text-align: left;">负责人</th>
                <th width="40"><span tdtype="order_by" fieldname="ordid">排序</span></th>
                <th width="40"><span data-field="status">状态</span></th>
                <th width="220">管理操作</th>
            </tr>
            </thead>
    	   <tbody>
            {$menu_list}
    	   </tbody>
        </table>
    </div>
    <div style="height: 60px;"></div>
    <div class="btn_wrap_fixed">
        <label class="select_all"><input type="checkbox" name="checkall" class="J_checkall">全选/取消</label>
        <input type="button" class="btn" data-tdtype="batch_action" data-acttype="ajax" data-uri="{:U('Companybranch/delete')}?ok=1" data-name="id" data-msg="确认删除" value="删除" />
        <div id="pages">{$page}</div>
    </div>
</div>
<include file="Login:footer" />
<link rel="stylesheet" type="text/css" href="__ROOT__/static/js/calendar/calendar-blue.css"/>
<script src="__ROOT__/static/js/calendar/calendar.js"></script>
</body>
</html>
