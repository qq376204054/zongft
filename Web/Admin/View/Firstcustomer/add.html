<!--菜单添加-->
<div class="dialog_content">
    <form id="info_form" name="info_form" action="{:U('Firstcustomer/add')}" method="post">
        <table width="100%" class="table_form">
            <tr>
                <th>客户名 :</th>
                <td><input type="text" name="name" id="name" class="input-text" value=""></td>
            </tr>
            <tr>
                <th>手机号 :</th>
                <td><input type="text" name="mobile" id="mobile" class="input-text" value=""></td>
            </tr>
            <tr>
                <th>城市 :</th>
                <td><input type="text" name="city" id="city" class="input-text" value=""></td>
            </tr>
            <tr>
                <th>需求金额 :</th>
                <td><input type="text" name="money" id="money" class="input-text" value=""></td>
            </tr>
            <tr>
                <th>渠道 :</th>
                <td><input type="text" name="channel" id="channel" class="input-text" value=""></td>
            </tr>
        </table>
    </form>
</div>
<script>
    $(function(){
        $.formValidator.initConfig({formid:"info_form",autotip:true});
        $("#name").formValidator({ onshow:lang.please_input+'客户名', onfocus:lang.please_input+'客户名', oncorrect:lang.input_right}).inputValidator({ min:1, onerror:lang.please_input+'客户名'});
        $("#mobile").formValidator({ onshow:lang.please_input+'手机号', onfocus:lang.please_input+'手机号', oncorrect:lang.input_right}).inputValidator({ min:1, onerror:lang.please_input+'手机号'});
        $("#city").formValidator({ onshow:lang.please_input+'城市', onfocus:lang.please_input+'城市', oncorrect:lang.input_right}).inputValidator({ min:1, onerror:lang.please_input+'城市'});
        $("#money").formValidator({ onshow:lang.please_input+'需求金额', onfocus:lang.please_input+'需求金额', oncorrect:lang.input_right}).inputValidator({ min:1, onerror:lang.please_input+'需求金额'});
        $("#channel").formValidator({ onshow:lang.please_input+'渠道', onfocus:lang.please_input+'渠道', oncorrect:lang.input_right}).inputValidator({ min:1, onerror:lang.please_input+'渠道'});
        $('#info_form').ajaxForm({success:complate,dataType:'json'});
        function complate(result){
            if(result.errNum === 0){
                $.dialog.get('add').close();
                $.yhxia.tip({content:result.retData});
                window.location.reload();
            } else {
                $.yhxia.tip({content:result.errMsg, icon:'alert'});
            }
        }
    })
</script>
