<include file="Login:header" />
<!--栏目列表-->
<div class="pad_lr_10">
    <div class="J_tablelist table_list" data-acturi="{:U('Config/ajax_edit')}">
    <table width="100%" cellspacing="0" id="J_cate_tree">
        <thead>
            <tr>
                <th width="30"><input type="checkbox" name="checkall" class="J_checkall"></th>
              	<th align="left" width="230">特殊标记（变量获取）<br>配置名称</th>
                <th align="left">配置详解</th>
                <th width="70">类型</th>
                <th width="40"><span tdtype="order_by" fieldname="ordid">排序</span></th>
                <th width="120">操作</th>
            </tr>
        </thead>
    	<tbody>
        <foreach name="list" item="item">
            <tr id="tr_id_{$item.id}">
                <td align='center'><input type='checkbox' value='{$item.id}' class='J_checkitem'></td>
                <td><div>{$item.name}</div><div style="color: #ff0000">{$item.title}</div></td>
                <td align='left'>{$item.remark}</td>
                <td align='center'>
                    <if condition="$item['type'] eq 3">两列变量
                        <elseif condition="$item['type'] eq 2"/>一列变量
                        <else/>单个变量
                    </if>
                </td>
                <td align='center'><span data-tdtype='edit' data-field='ordid' data-id='{$item.id}' class='tdedit'>{$item.ordid}</span></td>
                <td align='center'>
                    <a href="javascript:;" class="J_showdialog" data-uri="{:U('config/add_value',array('id'=>$item['id']))}" data-title="修改 - {$item['title']} - 的值" data-id="add_value" data-width="500" data-height="150">修改配置值</a> |
                    <a href="javascript:;" data-callback="dd('#tr_id_{$item.id}')" data-acttype="ajax" class="J_confirmurl" data-uri="{:U('config/delete',array('id'=>$item['id']))}" data-msg="确认要删除 - {$item['title']} - 吗？">删除</a>
                </td>
            </tr>
        </foreach>
    	</tbody>
    </table>
    </div>
    <div style="height: 60px;"></div>
    <div class="btn_wrap_fixed">
        <label class="select_all"><input type="checkbox" name="checkall" class="J_checkall">全选/取消</label>
        <input type="button" class="btn" data-tdtype="batch_action" data-acttype="ajax" data-uri="{:U('config/delete')}?ok=1" data-name="id" data-msg="确认删除" value="删除" />
    </div>
</div>
<include file="Login:footer" />
<script src="__ROOT__/static/js/jquery/plugins/jquery.treetable.js"></script>
<script>
    function dd(obj){$(obj).remove();}
    $(function(){
        $("#J_cate_tree").treeTable({indent:20,treeColumn:1});
        $(".J_preview").preview();
    });
</script>
</body>
</html>
