<!--添加栏目-->
<div class="dialog_content" style="max-height: 350px; overflow:auto;">
	<form id="info_form" action="{$info.url}" method="{$info.type}">
		<table width="100%" class="table_form">
			<tr>
				<td>传参方式 :</td>
				<td>{$info.type}</td>
			</tr>
			<tr>
				<td>url地址 :</td>
				<td>{$info.url}</td>
			</tr>
			<tr>
				<td>备注 :</td>
				<td>{$info.remark}</td>
			</tr>
			<foreach name="info['config']" item="vo">
			<tr>
				<td>{$vo[0]}--{$key} :</td>
				<td><input class="form-control filed_input" size="55" name="{$key}" value="{$vo[1]}"></td>
			</tr>
			</foreach>
			<tr>
				<td colspan="2" align="center">输出 :</td>
			</tr>
			<tr>
				<td colspan="2" align="center">
					<textarea class="form-control" id="getOrPost_value" readonly style="height: 200px;width: 100%"></textarea>
				</td>
			</tr>
			<tr>
				<td colspan="2" align="center">传染参数 :</td>
			</tr>
			<tr>
				<td colspan="2" align="center">
					<textarea class="form-control" id="give_value" readonly style="height: 200px;width: 100%"></textarea>
				</td>
			</tr>
		</table>
	</form>
</div>
<script src="__ROOT__/static/js/jsonToStr.js" type="text/javascript"></script>
<script>
	$(function(){
		$.formValidator.initConfig({formid:"info_form",autotip:true});
		$('#info_form').ajaxForm({success:success,beforeSend:checkForm});
		function success(data){
			if(typeof data=='object'){
				$('#getOrPost_value').val(formatJson(data));
			}else{
				$('#getOrPost_value').val(data);
			}
		}
		function checkForm(){
			var str='';
			$("#info_form").find('.filed_input').each(function(){
				if($(this).val()==''){}else{
					str=str+$(this).attr('name')+' ---> '+$(this).val()+'\r\n';
				}
			});
			$('#give_value').val(str);
			return true;
		}
