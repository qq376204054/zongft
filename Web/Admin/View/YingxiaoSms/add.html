<!--添加栏目-->
<div class="dialog_content" style="max-height: 350px; overflow-y: auto;">
	<form id="info_form" action="{:U('add')}" method="post">
		<input type="hidden" name="id" value="{$info['id']}">
		<table width="100%" class="table_form" id="table_form">
			<tr>
				<th colspan="2" style="float: left;">营销活动名称 : <input type="text" name="name" id="name" class="input-text" value="{$info.name}"></th>
			</tr>
			<tr>
				<th colspan="2" style="float: left;">短信对接key : <input type="text" name="sms_key" id="sms_key" class="input-text" value="{$info.sms_key}"></th>
			</tr>
			<tr>
				<th colspan="2" style="float: left;">短信的签名 : <input type="text" name="qianming" id="qianming" class="input-text" value="{$info.qianming}"></th>
			</tr>
			<tr>
				<th colspan="2" style="float: left;">发送的内容 : <textarea type="text" name="content" id="content" style="width: 400px;line-height: 25px;height: 200px">{$info.content}</textarea></th>
			</tr>
		</table>
	</form>
</div>
<script>
	$(function(){
		$.formValidator.initConfig({formid:"info_form",autotip:true});
		$('#info_form').ajaxForm({success:complate,dataType:'json'});
		function complate(result){
			if(result.errNum === 0){
				$.dialog.get('add').close();
				$.yhxia.tip({content:result.retData});
				window.location.reload();
			} else {
				$.yhxia.tip({content:result.errMsg, icon:'alert'});
			}
		}
	});
</script>
