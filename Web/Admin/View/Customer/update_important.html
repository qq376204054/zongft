<!--菜单添加-->
<div class="dialog_content">
    <form id="info_form" name="info_form" action="{:U('Customer/update_important')}" method="post">
        <table width="100%" class="table_form">
            <tr>
                <th>渠道 :</th>
                <td><input type="text" name="channel" id="channel" class="input-text" value="{$info.channel}"></td>
            </tr>
            <tr>
                <th>城市 :</th>
                <td>
                    <select name="city" id="add_city">
                        <option value=""></option>
                        <foreach name="allocateCity" item="vo">
                            <option value="{$vo}">{$vo}</option>
                        </foreach>
                    </select>
                </td>
            </tr>
        </table>
        <input type="hidden" name="id" class="input-text" value="{$info.id}">
    </form>
</div>
<script>
    $(function(){
        $.formValidator.initConfig({formid:"info_form",autotip:true});
        $("#channel").formValidator({ onshow:lang.please_input+'渠道名', onfocus:lang.please_input+'渠道名', oncorrect:lang.input_right}).inputValidator({ min:1, onerror:lang.please_input+'渠道名'});
        $('#info_form').ajaxForm({success:complate,dataType:'json'});
        function complate(result){
            if(result.errNum === 0){
                $.dialog.get('important').close();
                $.yhxia.tip({content:result.retData});
                window.location.reload();
            } else {
                $.yhxia.tip({content:result.errMsg, icon:'alert'});
            }
        }
    })
</script>
<notempty name="info">
    <script type="text/javascript">
        $('#add_city').val("{$info.city}");
    </script>
</notempty>
