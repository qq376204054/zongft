<include file="Login:header" />
<!--菜单列表-->
<div class="pad_lr_10">
    <div class="J_tablelist table_list" data-acturi="{:U('daohang/ajax_edit')}">
        <table width="100%" cellspacing="0">
            <thead>
            <tr>
                <th width="40"><input type="checkbox" name="checkall" class="J_checkall"></th>
                <th width="40"><span tdtype="order_by" fieldname="id">ID</span></th>
      			<th>导航名称</th>
                <th>指向链接</th>
                <th>打开方式</th>
                <th><span tdtype="order_by" fieldname="ordid">排序</span></th>
                <th width="160">管理操作</th>
            </tr>
            </thead>
    	   <tbody>
            {$menu_list}
    	   </tbody>
        </table>
    </div>
    <div style="height: 60px;"></div>
    <div class="btn_wrap_fixed">
        <label class="select_all"><input type="checkbox" name="checkall" class="J_checkall">全选/取消</label>
        <input type="button" class="btn" data-tdtype="batch_action" data-acttype="ajax" data-uri="{:U('menu/delete')}?ok=1" data-name="id" data-msg="确认删除" value="删除" />
        <div id="pages">{$page}</div>
    </div>
</div>
<include file="Login:footer" />
</body>
</html>
